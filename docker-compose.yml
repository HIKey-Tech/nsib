# NSIB — full stack: Next.js app + Postgres.
# Set POSTGRES_PASSWORD (and the rest) in .env — compose interpolates it below.
#   deploy:  docker compose up -d --build
#   admin :  docker compose exec app node scripts/create-admin.mjs <email> <pw> <name>
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Overrides any host-oriented value in .env — inside the compose network
      # the DB is reachable as "db:5432".
      DATABASE_URL: postgres://nsib:${POSTGRES_PASSWORD:-nsib}@db:5432/nsib
      STORAGE_PROVIDER: local
    ports:
      - "3000:3000"
    volumes:
      # Bind mount so uploads survive image rebuilds and backup.sh finds them
      # at ./public/uploads on the host. mkdir it first, owned by uid 1000.
      - ./public/uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nsib
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nsib}
      POSTGRES_DB: nsib
    # Host 5433 (not 5432) to avoid clashing with any native Postgres already on 5432.
    # Only needed for running host-side tools against the DB; safe to remove.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql runs once, on first boot of an empty data volume
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nsib -d nsib"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
